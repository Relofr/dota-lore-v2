<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Dota 2 Lore</title>
    <script>
      // SPA redirect for GitHub Pages with custom domain (segmentCount = 0)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
